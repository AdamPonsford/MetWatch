<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Service Weather Comparison</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #0070f3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card h3 { margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .temp { font-size: 32px; font-weight: bold; color: #111; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Weather Service Comparison</h2>
    <div class="search-box">
        <input type="text" id="cityInput" value="London" placeholder="Enter a city...">
        <button onclick="getWeather()">Compare</button>
    
    </div>
    <h3 id="locationDisplay" style="color: #666; margin-bottom: 20px;"></h3>

    <div class="grid" id="weatherGrid" style="display: none;">
        <div class="card">
            <h3>UK Met Office (BBC Source)</h3>
            <div class="temp" id="uk-temp">--°C</div>
            <p id="uk-desc">Loading...</p>
        </div>

        <div class="card">
            <h3>ECMWF (Euro Model)</h3>
            <div class="temp" id="euro-temp">--°C</div>
            <p id="euro-desc">Loading...</p>
        </div>

        <div class="card">
            <h3>GFS (US Global Model)</h3>
            <div class="temp" id="us-temp">--°C</div>
            <p id="us-desc">Loading...</p>
        </div>
    </div>
</div>

<script>
function getWeatherDesc(code) {
    const codes = {0: "Clear Sky", 1: "Mainly Clear", 2: "Partly Cloudy", 3: "Overcast", 45: "Fog", 48: "Depositing Rime Fog", 51: "Drizzle", 61: "Rain", 71: "Snow", 80: "Rain Showers"};
    return codes[code] || "Variable Conditions";
}

async function getWeather() {
    const city = document.getElementById('cityInput').value;
    document.getElementById('weatherGrid').style.display = 'grid';
    
    // Clear out the old location name while loading
    document.getElementById('locationDisplay').innerText = "Locating...";

    // ... (keep your UI reset elements code here)

    try {
        // 1. Get coordinates and location details
        const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
        const geoData = await geoRes.json();
        
        if (!geoData.results || geoData.results.length === 0) {
            document.getElementById('locationDisplay').innerText = "";
            alert("Location not found!");
            return;
        }
        
        // Extract the location data
        const result = geoData.results[0];
        const latitude = result.latitude;
        const longitude = result.longitude;
        
        // Build a readable location string (e.g., "Preston, England, United Kingdom")
        const locationName = [result.name, result.admin1, result.country].filter(Boolean).join(', ');
        
        // Display it on the screen!
        document.getElementById('locationDisplay').innerText = `Showing weather for: ${locationName} (${latitude.toFixed(2)}, ${longitude.toFixed(2)})`;

        // 2. Fetch current weather
        const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weather_code`;
        const weatherRes = await fetch(weatherUrl);
        const data = await weatherRes.json();

        // 3. Update the UI cards
        const temp = `${Math.round(data.current.temperature_2m)}°C`;
        const desc = getWeatherDesc(data.current.weather_code);

        const elements = ['uk', 'euro', 'us'];
        elements.forEach(id => {
            document.getElementById(`${id}-temp`).innerText = temp;
            document.getElementById(`${id}-desc`).innerText = desc;
        });

    } catch (error) {
        console.error("Error:", error);
        document.getElementById('locationDisplay').innerText = "Error finding location.";
    }
}

// Run once on initial layout load
getWeather();
</script></body>
</html>
